<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Reservas CEQ</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2a4a 0%, #1a3a6b 50%, #0d1f3c 100%);
      color: #e8dcc8;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(15, 32, 64, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(200, 168, 75, 0.2);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    header {
      background: linear-gradient(90deg, #1a3a6b 0%, #2a5298 100%);
      border-bottom: 3px solid #c8a84b;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .main {
      padding: 28px;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 28px;
    }

    .space-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .space-btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: 2px solid rgba(200,168,75,0.3);
      background: rgba(200,168,75,0.08);
      color: #d4c070;
      cursor: pointer;
    }

    .space-btn.active {
      background: #c8a84b;
      color: #1a3a6b;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .calendar-day {
      aspect-ratio: 1;
      border-radius: 6px;
      padding: 8px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
    }

    .calendar-day.free {
      background: rgba(80,200,80,0.18);
      border-color: #4caf50;
    }

    .calendar-day.partial {
      background: rgba(255,200,0,0.18);
      border-color: #ffd54d;
    }

    .calendar-day.full {
      background: rgba(220,80,80,0.22);
      border-color: #ff6b6b;
    }

    .calendar-day.disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .calendar-day.selected {
      outline: 2px solid #fff;
    }

    .form-panel {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-group input,
    .form-group textarea {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .hours-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .turno-btn {
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(200,168,75,0.3);
      background: rgba(200,168,75,0.08);
      color: #d4c070;
      cursor: pointer;
      font-weight: bold;
    }

    .turno-btn.selected {
      background: #c8a84b;
      color: #1a3a6b;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #c8a84b;
      color: #1a3a6b;
      font-weight: bold;
      cursor: pointer;
    }

    .selected-range {
      margin-top: 10px;
      padding: 10px;
      background: rgba(200,168,75,0.12);
      border-radius: 6px;
      text-align: center;
    }

  </style>

</head>
<body>

<div class="container">

<header>
  <h1>Centro de Estudiantes de Química — Reservas</h1>
</header>

<div class="main">

<div>

<div class="space-buttons">
  <button class="space-btn active" data-espacio="1">🏠 Altillo</button>
  <button class="space-btn" data-espacio="2">🏛 Sala</button>
  <button class="space-btn" data-espacio="3">🚪 Frente</button>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

</div>

<div class="form-panel">

<h2>Nueva Reserva</h2>

<div class="form-group">
  <label>Espacio</label>
  <input type="text" id="espacioNombre" disabled>
</div>

<div class="form-group">
  <label>Fecha</label>
  <input type="date" id="fecha" disabled>
</div>

<div class="form-group">

<label>Turno</label>

<div class="hours-grid" id="hoursGrid"></div>

<div class="selected-range" id="selectedRange" style="display:none"></div>

</div>

<div class="form-group">
<label>Nombre</label>
<input type="text" id="nombre">
</div>

<div class="form-group">
<label>Celular</label>
<input type="text" id="celular">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Motivo</label>
<textarea id="motivo"></textarea>
</div>

<button class="btn-primary" id="btnReservar">
Crear Reserva
</button>

<div id="statusMessage"></div>

</div>

</div>
</div>

<script>

const API_BASE = 'https://ceq-reservas-api.onrender.com/api';

let espacioSeleccionado = 1;
let diaSeleccionado = null;
let turnoSeleccionado = null;
let horasSeleccionadas = [];
let reservasActuales = [];

const espacios = {
  1: 'Altillo',
  2: 'Sala de Reuniones',
  3: 'Frente'
};

async function init() {

  document.getElementById('espacioNombre').value =
    espacios[espacioSeleccionado];

  configurarEspacios();
  configurarTurnos();
  configurarReserva();

  await cargarReservas();
  generarCalendario();

}

async function cargarReservas() {

  try {

    const res = await fetch(`${API_BASE}/reservas`);

    reservasActuales = await res.json();

  } catch (e) {

    console.error(e);

  }

}

function configurarEspacios() {

  document.querySelectorAll('.space-btn').forEach(btn => {

    btn.onclick = () => {

      document.querySelectorAll('.space-btn')
        .forEach(b => b.classList.remove('active'));

      btn.classList.add('active');

      espacioSeleccionado = parseInt(btn.dataset.espacio);

      document.getElementById('espacioNombre').value =
        espacios[espacioSeleccionado];

      generarCalendario();

    };

  });

}

function generarCalendario() {

  const grid = document.getElementById('calendarGrid');

  grid.innerHTML = '';

  const hoy = new Date();

  const año = hoy.getFullYear();
  const mes = hoy.getMonth();

  const diasMes = new Date(año, mes + 1, 0).getDate();

  for (let dia = 1; dia <= diasMes; dia++) {

    const fecha = `${año}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;

    const reservasDia = reservasActuales.filter(r =>
      r.fecha === fecha &&
      r.espacio_id === espacioSeleccionado
    );

    const div = document.createElement('div');

    div.className = 'calendar-day';

    if (reservasDia.length === 0) {
      div.classList.add('free');
    } else if (reservasDia.length < 3) {
      div.classList.add('partial');
    } else {
      div.classList.add('full');
    }

    div.innerHTML = `<strong>${dia}</strong>`;

    div.onclick = () => seleccionarDia(fecha, div);

    grid.appendChild(div);

  }

}

function seleccionarDia(fecha, element) {

  document.querySelectorAll('.calendar-day')
    .forEach(d => d.classList.remove('selected'));

  element.classList.add('selected');

  diaSeleccionado = fecha;

  document.getElementById('fecha').value = fecha;

  actualizarHorasDisponibles(fecha);

}

function configurarTurnos() {}

function actualizarHorasDisponibles(fecha) {

  const grid = document.getElementById('hoursGrid');

  grid.innerHTML = '';

  turnoSeleccionado = null;
  horasSeleccionadas = [];

  if (espacioSeleccionado === 3) {

    const turnos = [
      {
        key: 'desayuno',
        text: '🌅 Desayuno',
        hora: '07:00 - 10:00'
      },
      {
        key: 'almuerzo',
        text: '🍽 Almuerzo',
        hora: '10:00 - 13:00'
      },
      {
        key: 'merienda',
        text: '☕ Merienda',
        hora: '14:00 - 18:00'
      }
    ];

    turnos.forEach(t => {

      const btn = document.createElement('button');

      btn.className = 'turno-btn';

      btn.innerHTML = `${t.text}<br><small>${t.hora}</small>`;

      btn.onclick = () => {

        document.querySelectorAll('.turno-btn')
          .forEach(b => b.classList.remove('selected'));

        btn.classList.add('selected');

        turnoSeleccionado = t.key;

        document.getElementById('selectedRange').style.display = 'block';

        document.getElementById('selectedRange').innerText =
          `${t.text} (${t.hora})`;

      };

      grid.appendChild(btn);

    });

  } else {

    const horas = Array.from({ length: 10 }, (_, i) =>
      `${(i + 8).toString().padStart(2, '0')}:00`
    );

    horas.forEach(hora => {

      const btn = document.createElement('button');

      btn.className = 'turno-btn';

      btn.textContent = hora;

      btn.onclick = () => {

        btn.classList.toggle('selected');

        if (horasSeleccionadas.includes(hora)) {

          horasSeleccionadas = horasSeleccionadas.filter(h => h !== hora);

        } else {

          horasSeleccionadas.push(hora);

        }

      };

      grid.appendChild(btn);

    });

  }

}

function configurarReserva() {

  document.getElementById('btnReservar')
    .onclick = crearReserva;

}

async function crearReserva() {

  try {

    let body;

    if (espacioSeleccionado === 3) {

      body = {

        espacio_id: espacioSeleccionado,

        nombre_solicitante:
          document.getElementById('nombre').value,

        contacto:
          `${document.getElementById('email').value} | ${document.getElementById('celular').value}`,

        fecha: diaSeleccionado,

        turno: turnoSeleccionado,

        motivo:
          document.getElementById('motivo').value

      };

    } else {

      if (horasSeleccionadas.length === 0) {

        mostrarError('Selecciona horario');

        return;

      }

      horasSeleccionadas.sort();

      const inicio = horasSeleccionadas[0];

      const ultima = horasSeleccionadas[horasSeleccionadas.length - 1];

      const fin = `${String(parseInt(ultima.split(':')[0]) + 1).padStart(2,'0')}:00`;

      body = {

        espacio_id: espacioSeleccionado,

        nombre_solicitante:
          document.getElementById('nombre').value,

        contacto:
          `${document.getElementById('email').value} | ${document.getElementById('celular').value}`,

        fecha: diaSeleccionado,

        hora_inicio: inicio,

        hora_fin: fin,

        motivo:
          document.getElementById('motivo').value

      };

    }

    const res = await fetch(`${API_BASE}/reservas`, {

      method: 'POST',

      headers: {
        'Content-Type': 'application/json'
      },

      body: JSON.stringify(body)

    });

    const data = await res.json();

    if (!res.ok) {

      mostrarError(data.error);

      return;

    }

    mostrarExito('Reserva creada correctamente');

    await cargarReservas();

    generarCalendario();

  } catch (e) {

    mostrarError('Error al crear reserva');

  }

}

function mostrarError(msg) {

  const div = document.getElementById('statusMessage');

  div.innerHTML = `<p style="color:red">${msg}</p>`;

}

function mostrarExito(msg) {

  const div = document.getElementById('statusMessage');

  div.innerHTML = `<p style="color:lightgreen">${msg}</p>`;

}

init();

</script>

</body>
</html>
