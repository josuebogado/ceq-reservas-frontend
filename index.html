<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Reservas CEQ</title>
  
  <!-- FullCalendar -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.js'></script>
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.css' rel='stylesheet' />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2a4a 0%, #1a3a6b 50%, #0d1f3c 100%);
      color: #e8dcc8;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(15, 32, 64, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(200, 168, 75, 0.2);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    header {
      background: linear-gradient(90deg, #1a3a6b 0%, #2a5298 100%);
      border-bottom: 3px solid #c8a84b;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 1px;
    }

    header .badge {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      padding: 28px;
    }

    .calendar-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .space-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .space-btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: 2px solid rgba(200, 168, 75, 0.3);
      background: rgba(200, 168, 75, 0.08);
      color: #d4c070;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .space-btn:hover {
      border-color: #c8a84b;
      background: rgba(200, 168, 75, 0.15);
    }

    .space-btn.active {
      background: #c8a84b;
      color: #1a3a6b;
      border-color: #c8a84b;
    }

    .calendar-wrapper {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(200, 168, 75, 0.15);
      border-radius: 12px;
      padding: 20px;
      overflow: auto;
      margin-bottom: 20px;
    }

    .reservas-list {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(200, 168, 75, 0.15);
      border-radius: 12px;
      padding: 20px;
    }

    .reservas-list h4 {
      font-size: 12px;
      letter-spacing: 2px;
      color: #c8a84b;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .reserva-item {
      padding: 12px;
      background: rgba(200, 168, 75, 0.05);
      border: 1px solid rgba(200, 168, 75, 0.15);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .reserva-item-nombre {
      font-weight: 600;
      color: #f0e6d0;
      margin-bottom: 4px;
    }

    .reserva-item-motivo {
      color: #aaa;
      font-style: italic;
    }

    .reserva-item-horario {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    .form-panel {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(200, 168, 75, 0.15);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: fit-content;
    }

    .form-panel h3 {
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 11px;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f0e6d0;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #c8a84b;
      background: rgba(200, 168, 75, 0.08);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .hours-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .hour-btn {
      padding: 10px;
      border: 1px solid rgba(200, 168, 75, 0.3);
      background: rgba(200, 168, 75, 0.08);
      color: #d4c070;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      text-align: center;
      font-weight: 500;
    }

    .hour-btn:hover:not(.disabled) {
      border-color: #c8a84b;
      background: rgba(200, 168, 75, 0.15);
    }

    .hour-btn.selected {
      background: #c8a84b;
      color: #1a3a6b;
      border-color: #c8a84b;
    }

    .hour-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: rgba(255, 255, 255, 0.05);
      background: rgba(0, 0, 0, 0.2);
      color: #555;
    }

    .selected-range {
      margin-top: 12px;
      padding: 12px;
      background: rgba(200, 168, 75, 0.1);
      border: 1px solid rgba(200, 168, 75, 0.2);
      border-radius: 6px;
      font-size: 13px;
      color: #d4c070;
      text-align: center;
    }

    button.btn-primary {
      padding: 12px;
      background: linear-gradient(135deg, #c8a84b, #e0c46a);
      color: #1a3a6b;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
      transition: all 0.3s;
      margin-top: 8px;
    }

    button.btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200, 168, 75, 0.3);
    }

    button.btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-message {
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      text-align: center;
    }

    .status-success {
      background: rgba(80, 200, 80, 0.15);
      border: 1px solid rgba(80, 200, 80, 0.3);
      color: #8c8;
    }

    .status-error {
      background: rgba(200, 80, 80, 0.15);
      border: 1px solid rgba(200, 80, 80, 0.3);
      color: #e88;
    }

    .status-info {
      background: rgba(100, 150, 200, 0.15);
      border: 1px solid rgba(100, 150, 200, 0.3);
      color: #8ac;
    }

    /* FullCalendar */
    .fc {
      --fc-event-bg-color: #c8a84b;
      --fc-event-border-color: #c8a84b;
      --fc-event-text-color: #1a3a6b;
    }

    .fc .fc-button-primary {
      background-color: #c8a84b;
      border-color: #c8a84b;
    }

    .fc .fc-button-primary:hover {
      background-color: #d4b662;
      border-color: #d4b662;
    }

    .fc .fc-col-header-cell {
      background-color: rgba(26, 58, 107, 0.3);
      color: #d4c070;
    }

    .fc .fc-daygrid-day {
      background-color: rgba(15, 32, 64, 0.3);
    }

    .fc .fc-daygrid-day.fc-day-today {
      background-color: rgba(200, 168, 75, 0.15);
      border: 2px solid #c8a84b;
    }

    .fc .fc-daygrid-day.selected-day {
      background-color: rgba(220, 100, 100, 0.25) !important;
      border: 2px solid #d86060 !important;
    }

    .fc-event-title {
      font-size: 11px;
      padding: 2px 4px;
    }

    .required {
      color: #e88;
    }

    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .space-buttons {
        flex-direction: column;
      }

      .space-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Centro de Estudiantes de Química — Reservas de Espacios</h1>
      <div class="badge" id="stats">Cargando...</div>
    </header>

    <div class="main">
      <div class="calendar-section">
        <!-- Botones de espacios -->
        <div class="space-buttons">
          <button class="space-btn active" data-espacio="1">🏠 Altillo</button>
          <button class="space-btn" data-espacio="2">🏛 Sala de Reuniones</button>
          <button class="space-btn" data-espacio="3">🚪 Frente</button>
        </div>

        <!-- Calendario -->
        <div class="calendar-wrapper">
          <div id="calendar"></div>
        </div>

        <!-- Lista de reservas -->
        <div class="reservas-list">
          <h4>Reservas del día seleccionado</h4>
          <div id="reservasList"></div>
        </div>
      </div>

      <!-- Formulario -->
      <div class="form-panel">
        <h3>Nueva Reserva</h3>
        <div id="statusMessage"></div>

        <div class="form-group">
          <label>Espacio seleccionado</label>
          <input type="text" id="espacioNombre" disabled style="background: rgba(200,168,75,0.1); border-color: #c8a84b;">
        </div>

        <div class="form-group">
          <label>Fecha <span class="required">*</span></label>
          <input type="date" id="fecha" disabled style="background: rgba(200,168,75,0.1);">
        </div>

        <div class="form-group">
          <label>Horario (1-3 horas) <span class="required">*</span></label>
          <div class="hours-grid" id="hoursGrid"></div>
          <div class="selected-range" id="selectedRange" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label for="nombre">Nombre Completo <span class="required">*</span></label>
          <input type="text" id="nombre" placeholder="Ej: Juan García" required>
        </div>

        <div class="form-group">
          <label for="celular">Celular <span class="required">*</span></label>
          <input type="tel" id="celular" placeholder="Ej: +595 123 456789" required>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" placeholder="Ej: juan@example.com" required>
        </div>

        <div class="form-group">
          <label for="motivo">Motivo <span class="required">*</span></label>
          <textarea id="motivo" placeholder="Descripción del uso..." required></textarea>
        </div>

        <button class="btn-primary" id="btnReservar" disabled>Crear Reserva</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://ceq-reservas-api.onrender.com/api';
    let calendar;
    let espacioSeleccionado = 1;
    let diaSeleccionado = null;
    let horasSeleccionadas = [];
    let reservasActuales = [];
    const espacios = { 1: 'Altillo', 2: 'Sala de Reuniones', 3: 'Frente' };

    async function init() {
      await cargarReservas();
      inicializarCalendario();
      configurarBotonespacios();
      configurarFormulario();
    }

    async function cargarReservas() {
      try {
        const res = await fetch(`${API_BASE}/reservas`);
        reservasActuales = await res.json();
        actualizarEstadisticas();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function actualizarEstadisticas() {
      try {
        const res = await fetch(`${API_BASE}/estadisticas`);
        const stats = await res.json();
        document.getElementById('stats').textContent = `${stats.reservas_activas} reserva${stats.reservas_activas !== 1 ? 's' : ''}`;
      } catch (error) {}
    }

    function inicializarCalendario() {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        firstDay: 1,
        buttonText: {
          today: 'Hoy'
        },
        events: function(info, successCallback) {
          const eventos = reservasActuales
            .filter(r => r.espacio_id === espacioSeleccionado && r.estado === 'activa')
            .map(r => ({
              id: r.id,
              title: `${r.hora_inicio}`,
              start: `${r.fecha}T${r.hora_inicio}`,
              extendedProps: { nombre: r.nombre_solicitante }
            }));
          successCallback(eventos);
        },
        dateClick: function(info) {
          document.querySelectorAll('.fc-daygrid-day').forEach(d => d.classList.remove('selected-day'));
          info.dayEl.classList.add('selected-day');
          diaSeleccionado = info.dateStr;
          document.getElementById('fecha').value = info.dateStr;
          actualizarHorasDisponibles(info.dateStr);
          mostrarReservasDelDia(info.dateStr);
        }
      });
      calendar.render();
    }

    function configurarBotonespacios() {
      document.querySelectorAll('.space-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.space-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          espacioSeleccionado = parseInt(btn.dataset.espacio);
          document.getElementById('espacioNombre').value = espacios[espacioSeleccionado];
          document.getElementById('fecha').value = '';
          document.getElementById('hoursGrid').innerHTML = '';
          document.getElementById('selectedRange').style.display = 'none';
          document.getElementById('reservasList').innerHTML = '';
          diaSeleccionado = null;
          horasSeleccionadas = [];
          calendar.refetchEvents();
        });
      });
    }

    function actualizarHorasDisponibles(fecha) {
      const grid = document.getElementById('hoursGrid');
      grid.innerHTML = '';
      horasSeleccionadas = [];

      const horas = Array.from({ length: 10 }, (_, i) => `${(i + 8).toString().padStart(2, '0')}:00`);
      
      const reservasDelDia = reservasActuales.filter(r => 
        r.espacio_id === espacioSeleccionado && r.fecha === fecha && r.estado === 'activa'
      );

      const horasOcupadas = new Set();
      reservasDelDia.forEach(r => {
        const [horaIni] = r.hora_inicio.split(':');
        const [horaFin] = r.hora_fin.split(':');
        for (let i = parseInt(horaIni); i < parseInt(horaFin); i++) {
          horasOcupadas.add(`${i.toString().padStart(2, '0')}:00`);
        }
      });

      horas.forEach((hora, indice) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'hour-btn';
        btn.textContent = hora;
        btn.dataset.indice = indice;

        if (horasOcupadas.has(hora)) {
          btn.classList.add('disabled');
          btn.disabled = true;
        } else {
          btn.addEventListener('click', () => toggleHora(btn, indice, horas));
        }
        grid.appendChild(btn);
      });
    }

    function toggleHora(btn, indice, todasHoras) {
      // Si ya está seleccionada, deseleccionar solo esa hora
      if (horasSeleccionadas.includes(btn.textContent)) {
        horasSeleccionadas = horasSeleccionadas.filter(h => h !== btn.textContent);
        btn.classList.remove('selected');
        
        if (horasSeleccionadas.length === 0) {
          document.getElementById('selectedRange').style.display = 'none';
        } else {
          mostrarRango();
        }
        validarFormulario();
        return;
      }

      // Si hace click en el primer botón de una nueva selección
      if (horasSeleccionadas.length === 0) {
        horasSeleccionadas = [btn.textContent];
        btn.classList.add('selected');
        mostrarRango();
        validarFormulario();
        return;
      }

      // Si hace click en el siguiente botón consecutivo
      const ultimaSeleccionada = horasSeleccionadas[horasSeleccionadas.length - 1];
      const [ultimaHora] = ultimaSeleccionada.split(':');
      const [clickHora] = btn.textContent.split(':');

      if (parseInt(clickHora) === parseInt(ultimaHora) + 1 && horasSeleccionadas.length < 3) {
        horasSeleccionadas.push(btn.textContent);
        btn.classList.add('selected');
        mostrarRango();
        validarFormulario();
        return;
      }
    }

    function mostrarRango() {
      if (horasSeleccionadas.length === 0) return;

      const rangoDiv = document.getElementById('selectedRange');
      const [hInicio] = horasSeleccionadas[0].split(':');
      const [hFin] = horasSeleccionadas[horasSeleccionadas.length - 1].split(':');
      const duracion = parseInt(hFin) - parseInt(hInicio) + 1;
      
      rangoDiv.textContent = `${horasSeleccionadas[0]} - ${String(parseInt(hFin) + 1).padStart(2, '0')}:00 (${duracion} hora${duracion > 1 ? 's' : ''})`;
      rangoDiv.style.display = 'block';
    }

    function mostrarReservasDelDia(fecha) {
      const lista = document.getElementById('reservasList');
      const reservasDelDia = reservasActuales.filter(r =>
        r.espacio_id === espacioSeleccionado && r.fecha === fecha && r.estado === 'activa'
      );

      if (reservasDelDia.length === 0) {
        lista.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">Sin reservas para este día</div>';
        return;
      }

      lista.innerHTML = reservasDelDia.map(r => {
        const horaInicio = r.hora_inicio.substring(0, 5);
        const horaFin = r.hora_fin.substring(0, 5);
        return `
        <div class="reserva-item">
          <div class="reserva-item-nombre">${r.nombre_solicitante}</div>
          <div class="reserva-item-motivo">${r.motivo || 'Sin motivo especificado'}</div>
          <div class="reserva-item-horario">${horaInicio} - ${horaFin}</div>
        </div>
      `}).join('');
    }

    function configurarFormulario() {
      document.getElementById('nombre').addEventListener('input', validarFormulario);
      document.getElementById('celular').addEventListener('input', validarFormulario);
      document.getElementById('email').addEventListener('input', validarFormulario);
      document.getElementById('motivo').addEventListener('input', validarFormulario);
      document.getElementById('btnReservar').addEventListener('click', crearReserva);

      document.getElementById('espacioNombre').value = espacios[espacioSeleccionado];
    }

    function validarFormulario() {
      const nombre = document.getElementById('nombre').value.trim();
      const celular = document.getElementById('celular').value.trim();
      const email = document.getElementById('email').value.trim();
      const motivo = document.getElementById('motivo').value.trim();
      const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      const celularValido = celular.length >= 9;

      document.getElementById('btnReservar').disabled = !(
        nombre && celularValido && emailValido && motivo && diaSeleccionado && horasSeleccionadas.length > 0
      );
    }

    async function crearReserva() {
      const nombre = document.getElementById('nombre').value.trim();
      const celular = document.getElementById('celular').value.trim();
      const email = document.getElementById('email').value.trim();
      const motivo = document.getElementById('motivo').value.trim();

      if (horasSeleccionadas.length === 0) {
        mostrarError('Selecciona al menos 1 hora');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/reservas`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            espacio_id: espacioSeleccionado,
            nombre_solicitante: nombre,
            contacto: `${celular} | ${email}`,
            fecha: diaSeleccionado,
            hora_inicio: horasSeleccionadas[0],
            motivo: motivo
          })
        });

        const data = await res.json();
        if (!res.ok) {
          mostrarError(data.error);
          return;
        }

        const [hFin] = horasSeleccionadas[horasSeleccionadas.length - 1].split(':');
        mostrarExito(`Reserva creada: ${horasSeleccionadas[0]} - ${String(parseInt(hFin) + 1).padStart(2, '0')}:00`);
        
        document.getElementById('nombre').value = '';
        document.getElementById('celular').value = '';
        document.getElementById('email').value = '';
        document.getElementById('motivo').value = '';
        document.getElementById('fecha').value = '';
        document.getElementById('hoursGrid').innerHTML = '';
        document.getElementById('selectedRange').style.display = 'none';
        diaSeleccionado = null;
        horasSeleccionadas = [];

        await cargarReservas();
        calendar.refetchEvents();
      } catch (error) {
        mostrarError('Error al crear la reserva');
      }
    }

    function mostrarError(msg) {
      const div = document.getElementById('statusMessage');
      div.className = 'status-message status-error';
      div.textContent = '⚠ ' + msg;
      setTimeout(() => div.innerHTML = '', 5000);
    }

    function mostrarExito(msg) {
      const div = document.getElementById('statusMessage');
      div.className = 'status-message status-success';
      div.textContent = '✓ ' + msg;
      setTimeout(() => div.innerHTML = '', 5000);
    }

    init();
  </script>
</body>
</html>
