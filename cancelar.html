<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancelar Reserva - CEQ</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2a4a 0%, #1a3a6b 50%, #0d1f3c 100%);
      color: #e8dcc8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(15, 32, 64, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(200, 168, 75, 0.2);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      color: #d4c070;
      text-align: center;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    label {
      font-size: 12px;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f0e6d0;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #c8a84b;
      background: rgba(200, 168, 75, 0.08);
    }

    button {
      padding: 12px;
      background: linear-gradient(135deg, #c8a84b, #e0c46a);
      color: #1a3a6b;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
      transition: all 0.3s;
      margin-top: 8px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200, 168, 75, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-message {
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      text-align: center;
      display: none;
    }

    .status-success {
      background: rgba(80, 200, 80, 0.15);
      border: 1px solid rgba(80, 200, 80, 0.3);
      color: #8c8;
    }

    .status-error {
      background: rgba(200, 80, 80, 0.15);
      border: 1px solid rgba(200, 80, 80, 0.3);
      color: #e88;
    }

    .info {
      background: rgba(200, 168, 75, 0.1);
      border: 1px solid rgba(200, 168, 75, 0.2);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 12px;
      line-height: 1.6;
      color: #d4c070;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #d4c070;
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: #e0c46a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cancelar Reserva</h1>

    <div class="info">
      📋 Ingresá el código de cancelación que recibiste en tu confirmación de reserva.
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div class="form-group">
      <label>Código de Cancelación</label>
      <input type="text" id="codigo" placeholder="Ej: RES-ABC123" autofocus>
    </div>

    <button id="btnCancelar" onclick="cancelarReserva()">Cancelar Reserva</button>

    <div class="back-link">
      <a href="https://ceq-reservas-frontend.vercel.app">← Volver a reservas</a>
    </div>
  </div>

  <script>
    const API_BASE = 'https://ceq-reservas-api.onrender.com/api';

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById('statusMessage');
      div.className = `status-message status-${tipo}`;
      div.textContent = texto;
      div.style.display = 'block';
      setTimeout(() => div.style.display = 'none', 5000);
    }

    async function cancelarReserva() {
      const codigo = document.getElementById('codigo').value.trim().toUpperCase();
      
      if (!codigo) {
        mostrarMensaje('⚠ Ingresá el código', 'error');
        return;
      }

      document.getElementById('btnCancelar').disabled = true;

      try {
        const res = await fetch(`${API_BASE}/cancelar-por-codigo`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ codigo })
        });

        const data = await res.json();

        if (res.ok) {
          mostrarMensaje('✓ Reserva cancelada exitosamente', 'success');
          document.getElementById('codigo').value = '';
          setTimeout(() => {
            window.location.href = 'https://ceq-reservas-frontend.vercel.app';
          }, 2000);
        } else {
          mostrarMensaje('❌ ' + (data.error || 'Error al cancelar'), 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        mostrarMensaje('❌ Error de conexión', 'error');
      } finally {
        document.getElementById('btnCancelar').disabled = false;
      }
    }

    // Permitir Enter
    document.getElementById('codigo').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') cancelarReserva();
    });
  </script>
</body>
</html>
